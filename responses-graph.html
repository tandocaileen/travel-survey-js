<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>📊 Survey Responses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --coral: #FF6B6B;
            --gold: #FFD93D;
            --mint: #6BCB77;
            --cream: #FFF9F0;
            --text: #3D3535;
            --muted: #888080;
            --border: #EFE6DA;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, .08)
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 60px
        }

        header {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 40%, #f39c12 100%);
            color: #fff;
            text-align: center;
            padding: 36px 20px 28px;
            position: relative
        }

        header h1 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 900;
            text-shadow: 0 2px 8px rgba(0, 0, 0, .2)
        }

        header p {
            opacity: .85;
            margin-top: 8px;
            font-size: .95rem
        }

        .back-btn {
            position: absolute;
            top: 18px;
            left: 18px;
            background: rgba(255, 255, 255, .2);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 700;
            font-size: .85rem;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, .35)
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 16px
        }

        .summary {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px
        }

        .stat-card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px 24px;
            flex: 1;
            min-width: 160px;
            border-top: 4px solid var(--gold)
        }

        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 900;
            color: var(--coral)
        }

        .stat-card .stat-label {
            font-size: .85rem;
            color: var(--muted);
            font-weight: 600;
            margin-top: 2px
        }

        .respondents {
            font-size: .85rem;
            color: var(--muted);
            margin-top: 6px
        }

        .chart-card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px
        }

        .chart-card h2 {
            font-size: .95rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 18px;
            line-height: 1.4;
            padding-left: 10px;
            border-left: 4px solid var(--coral)
        }

        .chart-wrap {
            position: relative;
            max-height: 320px
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 1.1rem
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 60px 20px;
            color: var(--muted)
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 4px solid var(--border);
            border-top-color: var(--coral);
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <header>
        <a class="back-btn" href="/">← Back to Survey</a>
        <h1>📊 Survey Responses</h1>
        <p id="header-count">Loading…</p>
    </header>
    <div class="container" id="main">
        <div class="loading">
            <div class="spinner"></div> Loading responses…
        </div>
    </div>

    <script>
        const COLORS = [
            "rgba(255,107,107,.8)", "rgba(255,217,61,.8)", "rgba(107,203,119,.8)",
            "rgba(116,192,252,.8)", "rgba(201,177,255,.8)", "rgba(255,159,100,.8)",
            "rgba(99,207,188,.8)", "rgba(255,134,172,.8)",
        ];

        async function load() {
            const main = document.getElementById('main');
            try {
                const res = await fetch('/responses');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const responses = await res.json();

                const total = responses.length;
                document.getElementById('header-count').textContent =
                    `${total} response${total !== 1 ? 's' : ''} collected`;

                if (total === 0) {
                    main.innerHTML = '<div class="empty">No responses yet. Share the survey link to collect answers! 🌏</div>';
                    return;
                }

                // Tally
                const tallies = {};
                const names = [];
                for (const entry of responses) {
                    names.push(entry['__name__'] || 'Anonymous');
                    for (const [key, val] of Object.entries(entry)) {
                        if (key.startsWith('_') || key === '__name__') continue;
                        if (!tallies[key]) tallies[key] = {};
                        for (const part of String(val).split(', ')) {
                            const p = part.trim();
                            if (p) tallies[key][p] = (tallies[key][p] || 0) + 1;
                        }
                    }
                }

                main.innerHTML = '';

                // Stats
                const stats = document.createElement('div');
                stats.className = 'summary';
                stats.innerHTML = `
      <div class="stat-card">
        <div class="stat-num">${total}</div>
        <div class="stat-label">Total Responses</div>
      </div>
      <div class="stat-card" style="border-top-color:#6BCB77">
        <div class="stat-num">${Object.keys(tallies).length}</div>
        <div class="stat-label">Questions Answered</div>
      </div>
      <div class="stat-card" style="border-top-color:#74C0FC;flex:2">
        <div class="stat-label" style="margin-bottom:6px">Respondents</div>
        <div class="respondents">${names.join(' · ')}</div>
      </div>
    `;
                main.appendChild(stats);

                // Charts
                Object.entries(tallies).forEach(([question, counts], idx) => {
                    const labels = Object.keys(counts);
                    const data = Object.values(counts);
                    const colors = labels.map((_, i) => COLORS[i % COLORS.length]);

                    const card = document.createElement('div');
                    card.className = 'chart-card';
                    card.innerHTML = `<h2>${question}</h2><div class="chart-wrap"><canvas id="chart-${idx}"></canvas></div>`;
                    main.appendChild(card);

                    new Chart(document.getElementById(`chart-${idx}`), {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [{ data, backgroundColor: colors, borderRadius: 8, borderSkipped: false }]
                        },
                        options: {
                            indexAxis: labels.length > 4 ? 'y' : 'x',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x ?? ctx.parsed.y} vote${(ctx.parsed.x ?? ctx.parsed.y) !== 1 ? 's' : ''}` } }
                            },
                            scales: {
                                x: { grid: { color: '#f5ede3' }, ticks: { font: { family: 'Nunito', weight: '600' } } },
                                y: { grid: { color: '#f5ede3' }, ticks: { font: { family: 'Nunito', weight: '600' } } }
                            }
                        }
                    });
                });

            } catch (err) {
                main.innerHTML = `<div class="empty">⚠️ Could not load responses.<br/><small>${err.message}</small></div>`;
            }
        }

        load();
    </script>
</body>

</html>
